general:
  seed: 42

wandb:
  api_key: "your_wandb_api_key_here"   # paste your key from wandb.ai/settings
  project: "ViTUnified"

model:
  model_name: "vit_small_patch16_224"
  pretrained: true
  num_classes: 2
  pad_dropout: 0.0

loss:
  margin: 0.5
  scale: 30.0

optimizer:
  lr: 1.0e-4
  weight_decay: 2.0e-5

scheduler:
  power: 3
  min_lr: 1.0e-5

training:
  epochs: 100
  batch_size: 256
  num_workers: 4
  pin_memory: true
  checkpoint_interval: 20

data:
  data_root: "data/"
  datasets: ["fvc", "sd302"]
  splits: "data/splits.json"
  n_genuine_impressions: 3
  n_impostor_impressions: 1
  impostor_mode: "sub"
  n_impostor_subset: 20

output:
  checkpoint_dir: "ckpts/recog/"
  best_model_name: "recog_best_eer.pth"