model:
  model_name: "vit_small_patch16_224"   # timm model name
  pretrained: true                       # ImageNet pre-trained weights
  in_channels: 3                         # RGB input
  num_classes_pad: 2                     # kept for model compat; not used in recog loss

loss:
  # embedding_dim is inferred from model.embed_dim at runtime (384 for ViT-Small)
  margin: 0.5                            # ArcFace angular margin (radians)
  scale: 30.0                            # ArcFace logit scale

optimizer:
  lr: 1.0e-4                             # initial learning rate
  weight_decay: 2.0e-5                   # AdamW weight decay

scheduler:
  power: 3                               # polynomial decay exponent
  min_lr: 1.0e-5                         # learning rate floor

training:
  epochs: 100
  batch_size: 256
  num_workers: 4
  pin_memory: true
  checkpoint_interval: 20               # periodic checkpoint every N epochs
  seed: 42

data:
  data_root: "data/"
  datasets: ["fvc", "sd302"]
  splits: "data/splits.json"
  split_ratio: [0.7, 0.15, 0.15]
  image_size: 224
  n_genuine_impressions: 8
  n_impostor_impressions: 1

output:
  checkpoint_dir: "ckpts/recog/"
  best_model_name: "recog_best_eer.pth"