general:
  seed: 42

wandb:
  api_key: ""
  project: "ViTUnified-Recognition"

model:
  model_name: "vit_small_patch16_224"
  pretrained: true
  num_classes: 2
  pad_dropout: 0.0

loss:
  margin: 0.5
  scale: 30.0

optimizer:
  lr: 1.0e-4
  weight_decay: 2.0e-5

scheduler:
  power: 3
  min_lr: 1.0e-5

training:
  epochs: 100
  batch_size: 256
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 20

data:
  data_root: "data/"
  split_path: "data/splits.json"
  n_genuine_impressions: 16
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: None

output:
  checkpoint_dir: "ckpts/recog/"
  best_model_name: "best_model.pth"

evaluation:
  batch_size: 256
  unique_batch_size: 256
  num_workers: 8
  pin_memory: true
  n_genuine_impressions: 16
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: None
  checkpoint_path: "ckpts/recog/best_model.pth"
