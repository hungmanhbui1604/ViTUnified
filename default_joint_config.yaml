general:
  seed: 42

wandb:
  api_key: null
  project: "ViTUnified-Joint"

data:
  recog_split_path: "data/recog_splits.json"
  pad_split_path: "data/pad_splits.json"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null
  transform_name: "vitunified"

training:
  epochs: 40
  recog_batch_size: 256
  pad_batch_size: 128
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 10

model:
  pretrained: false
  num_classes: 2
  pad_dropout: 0.0
  ckpt_path: "ckpts/recog/best_model.pth"
  teacher_ckpt: "ckpts/recog/best_model.pth"

optimizer:
  lr: 1.0e-4
  weight_decay: 2.0e-5

scheduler:
  power: 3
  min_lr: 1.0e-5

loss:
  recog_weight: 1.0
  pad_weight: 1.0

output:
  checkpoint_dir: "ckpts/joint/"
  best_model_name: "best_model.pth"

evaluation:
  recog_batch_size: 1024
  pad_batch_size: 128
